<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玮特思合同系统 - 专业版</title>
    <style>
        :root { --brand-color: #59b9bd; --paper-width: 210mm; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: "PingFang SC", sans-serif; margin: 0; display: flex; background: #f4f7f9; height: 100vh; }

        /* 左侧选择栏样式 */
        .no-print-sidebar {
            width: 380px; padding: 25px; background: white;
            border-right: 1px solid #e2e8f0; overflow-y: auto; height: 100vh;
        }
        .sidebar-header { display: flex; align-items: center; margin-bottom: 25px; font-weight: bold; font-size: 18px; }
        .input-block { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569; }
        .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        
        input, .file-input-box {
            width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px;
        }
        .device-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .device-row input { flex: 1; padding: 8px; font-size: 13px; }
        .delete-btn { color: #ff4d4f; cursor: pointer; font-weight: bold; padding: 0 5px; }

        /* 右侧预览区样式 */
        .preview-area { flex: 1; overflow-y: auto; padding: 40px; display: flex; justify-content: center; }
        .paper {
            width: var(--paper-width); min-height: 297mm; padding: 20mm;
            background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative;
        }

        /* 表格与计算样式 */
        table { width: 100% !important; border-collapse: collapse; table-layout: fixed; margin: 20px 0; border: 1.5px solid #000; }
        th, td { border: 1px solid #000; padding: 10px; font-size: 13px; text-align: center; word-wrap: break-word; }
        th { background: #f2f2f2; }
        .tfoot-label { text-align: right; font-weight: bold; padding-right: 15px; }

        /* 公章与签署 */
        .sign-wrap { display: flex; justify-content: space-between; margin-top: 40px; }
        .sign-box { width: 48%; border: 1px solid #000; padding: 15px; position: relative; min-height: 150px; }
        .seal-img { position: absolute; width: 130px; right: 15px; top: 10px; opacity: 0.95; z-index: 10; }

        @media print {
            .no-print-sidebar { display: none !important; }
            body { background: white; }
            .preview-area { padding: 0; }
            .paper { width: 100% !important; box-shadow: none; padding: 10mm; }
        }

        .btn-add {
            width: 100%; padding: 10px; border: 1.5px solid var(--brand-color);
            color: var(--brand-color); background: transparent; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-add:hover { background: #f0fdfa; }
        .btn-print {
            width: 100%; padding: 12px; background: var(--brand-color);
            color: white; border: none; border-radius: 8px; font-weight: bold;
            margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="no-print-sidebar">
        <div class="sidebar-header">📄 玮特思合同系统</div>
        
        <div class="input-block">
            <label>乙方公司 (已固化)</label>
            <input type="text" value="上海玮玮特思智能设备有限公司" disabled style="background: #f8fafc;">
        </div>

        <div class="input-block">
            <label>插入公司 Logo</label>
            <input type="file" id="logo-upload" accept="image/*" onchange="handleLogo(this)">
            <div class="hint">*建议上传透明底 Logo 图片</div>
        </div>

        <div class="input-block">
            <label>合同标题</label>
            <input type="text" id="in-title" placeholder="如：智能设备采购合同" oninput="syncFields()" value="技术服务报价单">
        </div>

        <div class="input-block">
            <label>甲方 (客户全称)</label>
            <input type="text" id="in-partyA" placeholder="请输入客户公司名称" oninput="syncFields()">
        </div>

        <div class="input-block">
            <label>合同日期</label>
            <input type="text" id="in-date" value="2026/02/25" oninput="syncFields()">
        </div>

        <div class="input-block">
            <label>报价明细表</label>
            <div id="items-list">
                <div class="device-row">
                    <input type="text" class="p-name" placeholder="名称/规格" oninput="calc()">
                    <input type="text" class="p-unit" placeholder="单位" value="套" oninput="calc()" style="width: 50px; flex: none;">
                    <input type="number" class="p-price" placeholder="单价" oninput="calc()">
                    <input type="number" class="p-qty" placeholder="数量" oninput="calc()">
                </div>
            </div>
            <button class="btn-add" onclick="addNewRow()">+ 添加设备项</button>
        </div>

        <div class="input-block">
            <label>折扣金额 (CNY)</label>
            <input type="number" id="in-discount" value="0" oninput="calc()">
        </div>

        <button class="btn-print" onclick="window.print()">打印 / 生成 PDF</button>
    </div>

    <div class="preview-area">
        <div class="paper">
            <img id="out-logo" style="max-height: 50px; margin-bottom: 10px; display: none;">
            <h2 id="out-title" style="text-align: center; margin-top: 0;">技术服务报价单</h2>
            
            <p>甲方：<span id="out-partyA" style="border-bottom: 1px solid #000; min-width: 180px; display: inline-block;"></span></p>
            <p>乙方：上海玮玮特思智能设备有限公司</p>
            <p>日期：<span id="out-date">2026/02/25</span></p>

            <table>
                <thead>
                    <tr>
                        <th style="width: 8%">序号</th>
                        <th style="width: 37%">产品名称及型号</th>
                        <th style="width: 10%">单位</th>
                        <th style="width: 10%">数量</th>
                        <th style="width: 15%">未税单价 (CNY)</th>
                        <th style="width: 20%">金额 (CNY)</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
                <tfoot>
                    <tr>
                        <td colspan="5" class="tfoot-label">未税总价</td>
                        <td id="res-untaxed">0.00</td>
                    </tr>
                    <tr>
                        <td colspan="5" class="tfoot-label">折扣</td>
                        <td id="res-discount">0.00</td>
                    </tr>
                    <tr>
                        <td colspan="5" class="tfoot-label">含税总价 (13%增值税)</td>
                        <td id="res-taxed" style="font-weight: bold;">0.00</td>
                    </tr>
                </tfoot>
            </table>

            <div class="sign-wrap">
                <div class="sign-box">
                    <p><b>甲方（客户）签署</b></p>
                    <p>单位：<span id="out-partyA-sign"></span></p>
                    <p>代表：___________</p>
                </div>
                <div class="sign-box">
                    <p><b>乙方（供方）签署</b></p>
                    <p>单位：上海玮玮特思智能设备有限公司</p>
                    <img src="seal.png" class="seal-img" alt="公章">
                    <p>代表：___________</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogo(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById('out-logo');
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function addNewRow() {
            const row = document.createElement('div');
            row.className = 'device-row';
            row.innerHTML = `
                <input type="text" class="p-name" placeholder="名称/规格" oninput="calc()">
                <input type="text" class="p-unit" placeholder="单位" value="套" oninput="calc()" style="width: 50px; flex: none;">
                <input type="number" class="p-price" placeholder="单价" oninput="calc()">
                <input type="number" class="p-qty" placeholder="数量" oninput="calc()">
                <span class="delete-btn" onclick="this.parentElement.remove(); calc();">×</span>
            `;
            document.getElementById('items-list').appendChild(row);
        }

        function syncFields() {
            document.getElementById('out-title').innerText = document.getElementById('in-title').value;
            const partyA = document.getElementById('in-partyA').value;
            document.getElementById('out-partyA').innerText = partyA;
            document.getElementById('out-partyA-sign').innerText = partyA;
            document.getElementById('out-date').innerText = document.getElementById('in-date').value;
        }

        function calc() {
            const names = document.querySelectorAll('.p-name');
            const units = document.querySelectorAll('.p-unit');
            const prices = document.querySelectorAll('.p-price');
            const qtys = document.querySelectorAll('.p-qty');
            const discInput = parseFloat(document.getElementById('in-discount').value) || 0;

            let html = '';
            let untaxedTotal = 0;

            names.forEach((n, i) => {
                const p = parseFloat(prices[i].value) || 0;
                const q = parseFloat(qtys[i].value) || 0;
                const line = p * q;
                untaxedTotal += line;

                html += `<tr>
                    <td>${i+1}</td>
                    <td style="text-align:left">${n.value || '-'}</td>
                    <td>${units[i].value || '套'}</td>
                    <td>${q}</td>
                    <td>${p.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td>${line.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                </tr>`;
            });

            const taxedTotal = (untaxedTotal - discInput) * 1.13;

            document.getElementById('table-body').innerHTML = html;
            document.getElementById('res-untaxed').innerText = untaxedTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('res-discount').innerText = discInput > 0 ? "-" + discInput.toLocaleString() : "0.00";
            document.getElementById('res-taxed').innerText = taxedTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
        }
    </script>
</body>
</html>
